apiVersion: v1
kind: Pod
metadata:
  name: nginx-probe
  namespace: rbac-lab

spec:
  containers:
  - name: nginx
    image: nginx

    livenessProbe:
      httpGet:
        path: /
        port: 80

      initialDelaySeconds: 5
      periodSeconds: 5

    readinessProbe:
      httpGet:
        path: /
        port: 80

      initialDelaySeconds: 3
      periodSeconds: 5