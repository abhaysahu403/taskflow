stages:
  - validate
  - frontend-build
  - backend-test
  - security

validate:
  stage: validate
  script:
    - echo "Pipeline Started"
    - echo "TaskFlow CI Working"

frontend-build:
  stage: frontend-build
  image: node:20

  before_script:
    - cd frontend
    - npm install

  script:
    - npm run build

  artifacts:
    paths:
      - frontend/dist

backend-test:
  stage: backend-test
  image: node:20

  before_script:
    - cd backend
    - npm install

  script:
    - node --version
    - npm list --depth=0

trivy-fs-scan:
  stage: security

  image:
    name: aquasec/trivy:latest
    entrypoint: [""]

  script:
    - trivy fs . --format table

  allow_failure: true

trivy-k8s-scan:
  stage: security

  image:
    name: aquasec/trivy:latest
    entrypoint: [""]

  script:
    - trivy config k8s/

  allow_failure: true

trivy-helm-scan:
  stage: security

  image:
    name: aquasec/trivy:latest
    entrypoint: [""]

  script:
    - trivy config taskflow-chart/

  allow_failure: true