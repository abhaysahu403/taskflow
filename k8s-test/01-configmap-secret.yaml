# ─── ConfigMap ────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: taskflow-config
  namespace: taskflow
data:
  MYSQL_HOST: "mysql-service"
  MYSQL_PORT: "3306"
  MYSQL_DATABASE: "taskflow_db"
  MYSQL_USER: "taskflow_user"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  PORT: "5000"
  NODE_ENV: "production"
  JWT_EXPIRES_IN: "7d"
  FRONTEND_URL: "http://frontend-service:80"

---
# ─── Secret ───────────────────────────────────────────────────
# Base64 encoded values:
#   taskflow_password  →  dGFza2Zsb3dfcGFzc3dvcmQ=
#   rootpassword       →  cm9vdHBhc3N3b3Jk
#   change_this_jwt_secret_in_production  →  Y2hhbmdlX3RoaXNfand0X3NlY3JldF9pbl9wcm9kdWN0aW9u
apiVersion: v1
kind: Secret
metadata:
  name: taskflow-secret
  namespace: taskflow
type: Opaque
data:
  MYSQL_PASSWORD: dGFza2Zsb3dfcGFzc3dvcmQ=
  MYSQL_ROOT_PASSWORD: cm9vdHBhc3N3b3Jk
  JWT_SECRET: Y2hhbmdlX3RoaXNfand0X3NlY3JldF9pbl9wcm9kdWN0aW9u
